steps:
  # 1. Build the lightweight CPU-bound Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/name_matcher_api:$COMMIT_SHA', '.']

  # 2. Push the Docker image to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/name_matcher_api:$COMMIT_SHA']

  # 3. Setup VM environment (Automated Install of Docker and Composer)
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'compute'
      - 'ssh'
      - 'name-matcher-vm'
      - '--zone=us-central1-f'
      - '--command'
      - |
        mkdir -p ~/name_matcher_tmp ~/name_matcher
        if ! command -v docker &> /dev/null; then
          echo "Installing Docker..."
          curl -fsSL https://get.docker.com -o get-docker.sh && sudo sh get-docker.sh
        fi
        if ! command -v docker-compose &> /dev/null; then
          echo "Installing Docker Compose..."
          sudo curl -L "https://github.com/docker/compose/releases/download/v2.24.5/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose
        fi

  # 4. Copy configuration and Caddyfile to the VM
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'compute'
      - 'scp'
      - '--zone=us-central1-f'
      - 'docker-compose.yml'
      - 'Caddyfile'
      - 'name-matcher-vm:~/name_matcher_tmp/'

  # 5. Execute Deployment (Swap images and restart Docker, Configure Caddy)
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'compute'
      - 'ssh'
      - 'name-matcher-vm'
      - '--zone=us-central1-f'
      - '--command'
      - |
        set -e
        # Always overwrite configs with latest
        mv ~/name_matcher_tmp/docker-compose.yml ~/name_matcher/
        mv ~/name_matcher_tmp/Caddyfile ~/name_matcher/
        
        cd ~/name_matcher
        
        # Prune old system artifacts
        sudo docker system prune -af || true
        
        # Update docker-compose image with the newly built SHA
        if grep -q "image: gcr.io/" docker-compose.yml; then
          sed -i 's|image: gcr.io/.*|image: gcr.io/'"$PROJECT_ID"'/name_matcher_api:'"$COMMIT_SHA"'|' docker-compose.yml
        else
          sed -i 's|build: \.|image: gcr.io/'"$PROJECT_ID"'/name_matcher_api:'"$COMMIT_SHA"'|' docker-compose.yml
        fi
        
        # Authenticate Docker to GCR on the VM
        sudo gcloud auth configure-docker --quiet
        
        sudo docker-compose pull
        sudo docker-compose up -d
        
        # Explicitly reload Caddy to catch any bind-mounted Caddyfile changes
        sudo docker exec caddy caddy reload --config /etc/caddy/Caddyfile || sudo docker-compose restart caddy

images:
  - 'gcr.io/$PROJECT_ID/name_matcher_api:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
