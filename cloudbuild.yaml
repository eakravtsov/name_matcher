steps:
  # 1. Build the lightweight CPU-bound Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/name_matcher_api:$COMMIT_SHA', '.']

  # 2. Push the Docker image to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/name_matcher_api:$COMMIT_SHA']

  # 3. Deploy to Google Compute Engine (via docker-compose)
  # NOTE: This assumes you have an instance named 'name-matcher-vm' running in 'us-central1-a'.
  # Update the zone and instance name as needed. This step SSHs into the instance,
  # pulls the new image, and restarts the docker-compose service.
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'compute'
      - 'ssh'
      - 'name-matcher-vm'
      - '--zone=us-central1-f'
      - '--command'
      - |
        mkdir -p ~/name_matcher && cd ~/name_matcher && \
        docker system prune -af && \
        if [ ! -f docker-compose.yml ]; then echo "Place docker-compose.yml here!" && exit 1; fi && \
        sed -i 's|image: gcr.io/.*|image: gcr.io/$PROJECT_ID/name_matcher_api:$COMMIT_SHA|' docker-compose.yml || \
        sed -i 's|build: .|image: gcr.io/$PROJECT_ID/name_matcher_api:$COMMIT_SHA|' docker-compose.yml && \
        docker-compose pull && \
        docker-compose up -d && \
        if ! grep -q "handle_path /name_matcher\*" /etc/caddy/Caddyfile; then \
          echo -e "\n    # Name Matcher Engine Reverse Proxy\n    handle_path /name_matcher* {\n        reverse_proxy localhost:8000\n    }" | sudo tee -a /etc/caddy/Caddyfile > /dev/null && \
          sudo caddy reload --config /etc/caddy/Caddyfile; \
        else \
          echo "Caddyfile already configured for name_matcher."; \
        fi

images:
  - 'gcr.io/$PROJECT_ID/name_matcher_api:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
