version: '3.8'

services:
  name_matcher_api:
    build: .
    container_name: name_matcher_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ROOT_PATH=/name_matcher
    volumes:
      # Map the SQLite DB persistence layer
      - ./names_kb.db:/app/names_kb.db

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
